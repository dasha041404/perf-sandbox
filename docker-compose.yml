services:
  sqlite:
    image: alpine:3.21
    command:
      - sh
      - -c
      - mkdir -p /data && chmod 777 /data && touch /data/.keep && exec tail -f /dev/null
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./back/.env
    environment:
      DATABASE_URL: sqlite:////data/app.db
    volumes:
      - sqlite_data:/data
    depends_on:
      - sqlite

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  sqlite_data:
  front_node_modules:
