services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/app.db
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
    external: true
    name: sqlite_data
