services:
  # Holds the named volume used for the SQLite database file mount (shared with `api`).
  sqlite:
    image: alpine:3.21
    command: ["sh", "-c", "mkdir -p /data && chmod 777 /data && touch /data/.keep && exec tail -f /dev/null"]
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/app.db
    volumes:
      - sqlite_data:/data
    depends_on:
      - sqlite

volumes:
  sqlite_data:
